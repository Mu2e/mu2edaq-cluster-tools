  - nickname: "Mu2e GPVM 06"    
    hostname: mu2egpvm06.fnal.gov
    group: General Access

# ── Nearline ───────────────────────────────────────────────────────────────
  - nickname: "Nearline 01"
    hostname: mu2e-nearline-01.fnal.gov
    group: Nearline

  - nickname: "Nearline 02"    
